server:
  port: 8082

spring:
  application:
    name: case-management
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fraud_detection}
    username: ${SPRING_DATASOURCE_USERNAME:fraud_user}
    password: ${SPRING_DATASOURCE_PASSWORD:fraud_pass_2024}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info
